<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F5F5F7">
<title>Fitness Log · Mafe</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="format-detection" content="telephone=no">
<link rel="stylesheet" href="styles.css?v=3">
</head>
<body>

<!-- ============ HEADER ============ -->
<header class="app-header">
  <div class="header-inner">
    <div class="header-top">
      <div><h1 class="app-title">Fitness Log</h1><div class="app-greeting" id="appGreeting"></div></div>
      <div class="month-selector">
        <button class="month-arrow" id="prevMonth" aria-label="Mes anterior">‹</button>
        <span class="month-label" id="monthLabel">Julio 2026</span>
        <button class="month-arrow" id="nextMonth" aria-label="Mes siguiente">›</button>
      </div>
    </div>
    <div class="header-summary" id="headerSummary">
      <!-- Render dinámico -->
    </div>
  </div>
</header>

<!-- ============ CONTENIDO ============ -->
<main class="app-main" id="appMain">
  <section class="view" id="view-dashboard"></section>
  <section class="view" id="view-gym" hidden></section>
  <section class="view" id="view-running" hidden></section>
  <section class="view" id="view-progreso" hidden></section>
  <section class="view" id="view-ajustes" hidden></section>
</main>

<!-- ============ TAB BAR ============ -->
<nav class="tab-bar" id="tabBar">
  <button class="tab active" data-view="dashboard"><span class="tab-icon">▦</span><span class="tab-text">Inicio</span></button>
  <button class="tab" data-view="gym"><span class="tab-icon">◈</span><span class="tab-text">Gym</span></button>
  <button class="tab" data-view="running"><span class="tab-icon">➤</span><span class="tab-text">Running</span></button>
  <button class="tab" data-view="progreso"><span class="tab-icon">◆</span><span class="tab-text">Progreso</span></button>
  <button class="tab" data-view="ajustes"><span class="tab-icon">⚙</span><span class="tab-text">Ajustes</span></button>
</nav>

<!-- ============ MODALES ============ -->
<div class="modal-overlay" id="modalOverlay" style="display:none">
  <div class="modal" id="modalBox" role="dialog" aria-modal="true">
    <!-- Render dinámico -->
  </div>
</div>

<!-- ============ TOAST ============ -->
<div class="toast" id="toast" style="display:none"></div>

<script src="app.js?v=3"></script>
</body>
</html>
